<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA para Streamers</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; background-color: #18181B; color: #EFEFF1; font-family: 'Inter', sans-serif; overflow: hidden; }
        
        #chat-container { display: flex; flex-direction: column; height: 100%; width: 350px; border-right: 1px solid #2f2f35; }
        #chat-messages { flex: 1; padding: 10px; display: flex; flex-direction: column; justify-content: flex-end; overflow-y: auto; }
        
        .message { margin-bottom: 8px; animation: fadeIn 0.3s; word-wrap: break-word; }
        .username { font-weight: 600; margin-right: 5px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #config-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content { background: #26262c; padding: 25px; border-radius: 8px; width: 320px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 15px 0; border-radius: 4px; border: none; background: #18181B; color: white; }
        button { width: 100%; padding: 10px; background: #9146FF; color: white; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        button:hover { background: #772CE8; }
        a { color: #BF94FF; text-decoration: none; }
    </style>
</head>
<body>

    <div id="config-modal">
        <div class="modal-content">
            <h3>Configurar IA</h3>
            <p style="font-size: 13px; color: #adadb8;">Obtenha sua chave gratuita em: <br> <a href="https://aistudio.google.com/" target="_blank">Google AI Studio</a></p>
            <input type="password" id="api-input" placeholder="Cole sua API Key aqui...">
            <button onclick="salvarAPI()">Salvar e Iniciar</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <div style="background: #0E0E10; padding: 10px;">
            <div id="status" style="font-size: 12px; margin-bottom: 5px; color: #adadb8;">Aguardando...</div>
            <button id="btn-start" onclick="iniciarEscuta()">Iniciar Escuta</button>
        </div>
    </div>

    <script>
    let GEMINI_API_KEY = localStorage.getItem('GEMINI_API_KEY');
    const modal = document.getElementById('config-modal');
    const statusText = document.getElementById('status');
    const chatMessages = document.getElementById('chat-messages');
    const btnStart = document.getElementById('btn-start');
    let userManualStop = false; 

    if (GEMINI_API_KEY) modal.style.display = 'none';

    function salvarAPI() {
        const key = document.getElementById('api-input').value.trim();
        if (key) {
            localStorage.setItem('GEMINI_API_KEY', key);
            location.reload();
        }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.lang = 'pt-BR'; // Mantenha pt-BR se fala em brasileiro

    recognition.onstart = () => {
        console.log("Sistema: Microfone ligado.");
        statusText.innerText = "Escutando... 🎙️";
    };

    recognition.onend = () => {
        if (!userManualStop) {
            console.log("Sistema: Reiniciando escuta...");
            recognition.start();
        }
    };

    recognition.onresult = async (event) => {
        const transcript = event.results[event.results.length - 1][0].transcript.trim();
        console.log("Microfone detetou: ", transcript); // <--- DEBUG 1
        
        if (transcript.length > 3) {
            await gerarReacaoChat(transcript);
        } else {
            console.log("Texto muito curto para a IA processar.");
        }
    };

    async function gerarReacaoChat(texto) {
        console.log("A enviar para a API:", texto); // <--- DEBUG 2
        try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: `Reaja a: "${texto}". Responda com 1 ou 2 frases curtas, estilo chat de Twitch. Formato: msg1 | msg2` }] }] })
            });
            
            const data = await res.json();
            console.log("Resposta recebida da API:", data); // <--- DEBUG 3
            
            if(data.error) {
                console.error("Erro na API:", data.error.message);
                statusText.innerText = "Erro na API: " + data.error.code;
                return;
            }

            const resposta = data.candidates[0].content.parts[0].text;
            const mensagens = resposta.split('|');
            
            mensagens.forEach(m => {
                const div = document.createElement('div');
                div.className = 'message';
                div.innerHTML = `<span class="username" style="color: #FF7F50">Espectador:</span> ${m.trim()}`;
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        } catch (err) {
            console.error("Erro fatal na comunicação:", err);
            statusText.innerText = "Erro de conexão.";
        }
    }
</script>
</body>
</html>
